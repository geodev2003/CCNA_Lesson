{type:"theory",title:"VLAN — khái niệm và lý do dùng",desc:"Tại sao VLAN là công cụ quan trọng nhất trong mạng doanh nghiệp.",
detail:{summary:"VLAN phân tách broadcast domain trên cùng phần cứng switch vật lý, giúp tổ chức mạng logic theo chức năng thay vì vị trí địa lý.",
points:["Không có VLAN: 100 máy cùng switch → mỗi broadcast đến tất cả 100 máy","Có VLAN: máy Clinical và Guest cách ly nhau dù cùng switch vật lý","VLAN ID: 1-4094. VLAN 1 là default (không nên dùng để truyền data)","Lợi ích: bảo mật (Guest không thấy Clinical), performance (giảm broadcast), quản lý","Cấu hình VLAN lưu trong vlan.dat (flash) — không bị xóa khi erase startup-config"],
tip:"VLAN 1 là native VLAN mặc định và là mục tiêu tấn công VLAN hopping — nên đổi native VLAN sang ID khác",
cmds:"switch(config)# vlan 10\nswitch(config-vlan)# name CLINICAL\nswitch(config)# vlan 20\nswitch(config-vlan)# name ADMIN\nswitch(config)# vlan 30\nswitch(config-vlan)# name GUEST\nswitch# show vlan brief"}},
{type:"theory",title:"Access port và Voice VLAN cho IP phone",desc:"Cấu hình cổng access và VLAN riêng cho hệ thống IP phone BV.",
detail:{summary:"Access port gán một VLAN duy nhất cho thiết bị end-user. Voice VLAN cho phép IP phone và PC chạy song song trên 1 cổng.",
points:["switchport mode access: cổng chỉ nhận untagged frame, gán vào 1 VLAN","switchport access vlan 10: gán cổng vào VLAN 10","Voice VLAN: IP phone kết nối switch, PC kết nối vào phone qua built-in switch","switchport voice vlan 30: phone dùng VLAN 30 (tagged), PC dùng VLAN 10 (untagged)","CDP giữa switch và phone để tự negotiate tốc độ và VLAN","show vlan brief: xem VLAN nào assign port nào"],
tip:"Voice VLAN phải có QoS CoS 5 (priority) để đảm bảo chất lượng thoại — cấu hình thêm: mls qos trust cos",
cmds:"switch(config)# interface f0/1\nswitch(config-if)# switchport mode access\nswitch(config-if)# switchport access vlan 10\nswitch(config-if)# switchport voice vlan 30\nswitch(config-if)# spanning-tree portfast\nswitch(config-if)# description PC_ICU_BED01\nswitch# show vlan brief\nswitch# show interfaces f0/1 switchport"}},
{type:"lab",title:"Lab: Tạo 3 VLAN, cấu hình access port, kiểm tra ping",desc:"Topology 6 PC với 3 VLAN — verify ping trong cùng VLAN được, khác VLAN không.",
detail:{summary:"Lab này xây dựng nền tảng cho tất cả lab VLAN phức tạp hơn. Phải thuần thục trước khi sang trunk và inter-VLAN routing.",
points:["Tạo: VLAN 10 (Clinical), VLAN 20 (Admin), VLAN 30 (Guest)","PC0,PC1 → VLAN 10 | PC2,PC3 → VLAN 20 | PC4,PC5 → VLAN 30","Gán IP cùng subnet cho máy cùng VLAN: 10.10.10.x/24, 10.20.20.x/24, 10.30.30.x/24","Ping PC0 → PC1: thành công | Ping PC0 → PC2: thất bại (khác VLAN)","Verify: show vlan brief, show interfaces Fx/x switchport"],
tip:"Nếu ping cùng VLAN vẫn fail: check IP có đúng subnet không, check port có đúng VLAN không",
cmds:"switch# show vlan brief\nswitch# show interfaces f0/1 switchport\nswitch# show mac address-table\nswitch# show interfaces status"}},
{type:"apply",title:"Áp dụng BV: Xây dựng VLAN plan cho BV",desc:"Đề xuất thiết kế VLAN phù hợp với hạ tầng và nhu cầu BV.",
detail:{summary:"Thiết kế VLAN tốt là nền tảng bảo mật mạng BV — cách ly thiết bị y tế khỏi mạng khách và hành chính.",
points:["VLAN 10 – CLINICAL: máy tính bàn, HIS/LIS client","VLAN 20 – MEDICAL-DEVICE: X-quang, MRI, siêu âm (cách ly hoàn toàn)","VLAN 30 – IPCAM: camera Vantech (stream video tốn bandwidth)","VLAN 40 – VOIP: IP phone (cần QoS riêng)","VLAN 50 – ADMIN: máy tính phòng hành chính, kế toán","VLAN 99 – MGMT: quản lý thiết bị mạng (switch, AP)","VLAN 100 – GUEST: Wi-Fi khách, chỉ ra Internet"],
tip:"Không để máy y tế và máy hành chính cùng VLAN — vi phạm HIPAA và dễ bị lateral movement nếu máy hành chính bị hack",
cmds:""}}
]},
{ph:1,w:6,topic:"Trunk & 802.1Q & VTP",sub:"Trunk port, tagging, VTP risks",lessons:[
{type:"theory",title:"Trunk port và 802.1Q tagging",desc:"Trunk mang nhiều VLAN qua 1 link vật lý giữa switch-switch hoặc switch-router.",
detail:{summary:"802.1Q là chuẩn IEEE cho VLAN tagging — chèn 4-byte tag vào frame Ethernet để xác định VLAN khi đi qua trunk.",
points:["Trunk = link mang nhiều VLAN (tagged). Access = link 1 VLAN (untagged)","802.1Q tag: 4 byte chèn vào frame sau Src MAC: TPID(0x8100) | PCP(CoS) | DEI | VLAN ID","Native VLAN: VLAN không bị tag trên trunk (default: VLAN 1) — nguy hiểm nếu không đổi","switchport trunk allowed vlan: chỉ cho phép VLAN cụ thể qua trunk — best practice","show interfaces trunk: xem trunk mode, native VLAN, allowed VLANs, active VLANs"],
tip:"Best practice: tắt DTP (switchport nonegotiate) và cấu hình trunk tường minh. DTP có thể bị exploit bằng tấn công switch spoofing",
cmds:"switch(config)# interface g0/1\nswitch(config-if)# switchport mode trunk\nswitch(config-if)# switchport trunk native vlan 999\nswitch(config-if)# switchport trunk allowed vlan 10,20,30,40,99\nswitch(config-if)# switchport nonegotiate\nswitch# show interfaces trunk\nswitch# show interfaces g0/1 switchport"}},
{type:"theory",title:"VTP — lợi ích và cạm bẫy revision number",desc:"VTP đồng bộ VLAN database nhưng có thể phá hủy toàn bộ VLAN nếu không cẩn thận.",
detail:{summary:"VTP (VLAN Trunking Protocol) là tính năng Cisco-proprietary giúp đồng bộ VLAN database. Tuy nhiên, rủi ro VTP revision number đã gây ra nhiều sự cố nghiêm trọng trong thực tế.",
points:["VTP Server: tạo/xóa/sửa VLAN, quảng bá qua trunk","VTP Client: nhận và apply VLAN database từ server","VTP Transparent: không tham gia VTP, chỉ forward, giữ VLAN local","Revision number: mỗi lần thay đổi VLAN tăng lên 1 — switch client LUÔN apply bản có revision cao nhất","CẠM BẪY: thêm switch cũ (revision cao hơn server hiện tại) → VLAN database bị ghi đè → toàn bộ trunk down"],
warn:"Recommendation: dùng VTP Transparent hoặc tắt VTP hoàn toàn trong môi trường production. Rủi ro quá cao so với lợi ích.",
cmds:"switch(config)# vtp mode transparent\nswitch(config)# vtp domain BenhVienA\nswitch# show vtp status\nswitch# show vtp counters"}},
{type:"lab",title:"Lab: Trunk 2 switch + mô phỏng VTP revision attack",desc:"Cấu hình trunk, verify VLAN đi đúng, thực nghiệm VTP revision để hiểu rủi ro.",
detail:{summary:"Lab quan trọng: thực nghiệm VTP revision attack giúp bạn hiểu tại sao nhiều engineer khuyến nghị tắt VTP.",
points:["Tạo 2 switch, nối trunk giữa 2 switch","Switch1: tạo VLAN 10,20,30 (VTP Server) | Switch2: VTP Client","Verify: show vlan brief trên Switch2 — đã nhận VLAN từ Switch1","Mô phỏng attack: reset Switch2 sang VTP Server với revision cao hơn → xem VLAN bị xóa trên Switch1","Lesson: khi thêm switch mới vào production, LUÔN kiểm tra 'show vtp status' và reset revision trước"],
tip:"Reset VTP revision: đổi VTP domain tạm (bất kỳ tên nào), rồi đổi lại — revision về 0",
cmds:"switch# show vtp status\nswitch# show interfaces trunk\nswitch# show vlan brief\n\nReset revision:\nswitch(config)# vtp domain TEMP\nswitch(config)# vtp domain BenhVienA"}},
{type:"extra",title:"Mở rộng: VLAN Hopping Attack",desc:"Hiểu cách attacker bypass VLAN isolation và cách phòng chống.",
detail:{summary:"VLAN hopping là kỹ thuật tấn công bypass VLAN segmentation. Hiểu để phòng chống đúng cách.",
points:["Switch Spoofing: attacker giả vờ là switch, negotiate trunk với switch thật → truy cập mọi VLAN","Double Tagging: gửi frame với 2 VLAN tag. Switch bỏ tag ngoài (native VLAN), tag trong đi vào VLAN đích","Phòng chống: switchport nonegotiate (tắt DTP), đổi native VLAN khỏi VLAN 1, port không dùng → shutdown + gán vào VLAN đen"],
tip:"Tất cả port không dùng: shutdown + access vlan 999 (VLAN không có thiết bị nào). Đây là hardening cơ bản.",
cmds:"switch(config)# interface range f0/10-24\nswitch(config-if-range)# switchport mode access\nswitch(config-if-range)# switchport access vlan 999\nswitch(config-if-range)# shutdown\nswitch(config-if-range)# description UNUSED_PORT"}}
]},
{ph:1,w:7,topic:"STP / RSTP",sub:"Root Bridge, Port roles, PortFast, BPDU Guard",lessons:[
{type:"theory",title:"STP: Tại sao cần và cách hoạt động",desc:"Layer 2 loop gây broadcast storm làm sập toàn mạng — STP ngăn chặn điều này.",
detail:{summary:"Switching loop khiến frame đi vòng vô tận, nhân lên theo cấp số nhân, gây broadcast storm trong vài giây. STP là cơ chế duy nhất ngăn điều này ở L2.",
points:["Broadcast storm: frame broadcast nhân lên mỗi vòng lặp → switch CPU 100% → mạng down hoàn toàn","Bridge Protocol Data Unit (BPDU): switch gửi nhau để bầu Root Bridge và chọn port trạng thái","Root Bridge election: Bridge ID = Priority(16bit) + MAC(48bit). BID nhỏ nhất = Root Bridge","Default priority: 32768. Ép Root Bridge: set priority 4096 hoặc thấp hơn (bội số của 4096)","Port roles: Root Port (tốt nhất về Root), Designated Port (forward), Blocked/Alternate (dự phòng)"],
tip:"Root Bridge PHẢI là switch tốt nhất (core switch) để traffic đi hiệu quả. Root Bridge mặc định theo MAC thấp nhất — không đáng tin cậy",
cmds:"switch(config)# spanning-tree vlan 10 priority 4096\nswitch# show spanning-tree vlan 10\nswitch# show spanning-tree detail"}},
{type:"theory",title:"RSTP (802.1w), PortFast và BPDU Guard",desc:"RSTP hội tụ nhanh hơn 50x so với STP. PortFast và BPDU Guard bảo vệ access port.",
detail:{summary:"RSTP thay thế STP trong hầu hết mạng hiện đại vì tốc độ hội tụ cực nhanh (<1 giây). PortFast và BPDU Guard là cặp đôi quan trọng cho access port.",
points:["RSTP port roles: Root, Designated, Alternate (thay Blocked), Backup","RSTP hội tụ: dùng handshake proposal/agreement thay vì đợi timer","PortFast: bỏ qua Listening/Learning → ngay lập tức Forwarding. Chỉ dùng trên access port nối PC/server","BPDU Guard: nếu port PortFast nhận BPDU (→ switch lạ cắm vào) → lập tức err-disable port","BPDU Filter: không gửi/nhận BPDU trên port (dùng cẩn thận — có thể tạo loop)"],
tip:"Luôn dùng PortFast + BPDU Guard song đôi trên access port. BPDU Guard bảo vệ khỏi nhân viên vô tình cắm switch vào port",
cmds:"switch(config)# spanning-tree mode rapid-pvst\nswitch(config)# interface f0/1\nswitch(config-if)# spanning-tree portfast\nswitch(config-if)# spanning-tree bpduguard enable\n\nGlobal:\nswitch(config)# spanning-tree portfast default\nswitch(config)# spanning-tree portfast bpduguard default\n\nVerify:\nswitch# show spanning-tree\nswitch# show spanning-tree inconsistentports"}},
{type:"extra",title:"Mở rộng: STP Tuning và bảo mật",desc:"Root Guard, Loop Guard và các kỹ thuật STP tuning nâng cao.",
detail:{summary:"Các tính năng này quan trọng trong mạng production nhưng ít được dạy ở cấp CCNA — biết thêm giúp troubleshoot hiệu quả hơn.",
points:["Root Guard: đặt trên Designated port — nếu nhận BPDU superior hơn, port vào inconsistent (block). Bảo vệ Root Bridge hiện tại","Loop Guard: bảo vệ khỏi unidirectional link failure — nếu port ngừng nhận BPDU, chuyển sang loop-inconsistent thay vì Designated","PVST+: mỗi VLAN có STP instance riêng → load balancing trên các trunk link","Uplink Fast / Backbone Fast: tính năng Cisco proprietary để hội tụ nhanh hơn (đã lỗi thời với RSTP)"],
tip:"Root Guard đặt trên port nối xuống access layer. Loop Guard đặt trên uplink/trunk port. Hai tính năng này bổ sung nhau.",
cmds:"switch(config-if)# spanning-tree guard root\nswitch(config-if)# spanning-tree guard loop\nswitch# show spanning-tree inconsistentports\nswitch# show spanning-tree detail | include BPDUs"}}
]},
{ph:1,w:8,topic:"Inter-VLAN Routing & DHCP",sub:"Router-on-a-stick, L3 Switch, DHCP helper",lessons:[
{type:"theory",title:"Router-on-a-stick vs Layer 3 Switch SVI",desc:"Hai phương pháp routing giữa các VLAN — hiểu ưu nhược để chọn đúng cho từng tình huống.",
detail:{summary:"Inter-VLAN routing cần thiết bị L3 (router hoặc L3 switch). Mỗi phương pháp có trade-off về hiệu suất và chi phí.",
points:["Router-on-a-stick: 1 physical interface + sub-interface. Dễ cấu hình nhưng bottleneck tại router","Sub-interface: int g0/0.10 / encapsulation dot1q 10 / ip address 192.168.10.1 255.255.255.0","L3 Switch SVI: interface vlan 10 / ip address → routing trong switch, hiệu suất cao hơn","L3 Switch: cần enable 'ip routing' global, thêm 'no switchport' cho routed port","Khi nào dùng gì: BV nhỏ (1 router): Router-on-a-stick. BV lớn (có L3 switch): SVI — performance tốt hơn"],
tip:"Thi CCNA: đề hay cho cả 2 phương pháp và hỏi tại sao L3 switch tốt hơn — trả lời: hardware-based routing, không qua WAN link",
cmds:"Router-on-a-stick:\nR(config)# interface g0/0.10\nR(config-subif)# encapsulation dot1q 10\nR(config-subif)# ip address 192.168.10.1 255.255.255.0\n\nL3 Switch SVI:\nSW(config)# ip routing\nSW(config)# interface vlan 10\nSW(config-if)# ip address 192.168.10.1 255.255.255.0\nSW(config-if)# no shutdown"}},
{type:"theory",title:"DHCP server và ip helper-address",desc:"Cấu hình DHCP tập trung và forward DHCP request qua subnet.",
detail:{summary:"DHCP relay (ip helper-address) là kỹ năng thiết yếu vì hầu hết mạng doanh nghiệp có DHCP server tập trung ở subnet khác với client.",
points:["DHCP pool: network, default-router (gateway), dns-server, lease time, excluded-address","DHCP Discover là broadcast — không qua router. ip helper-address chuyển broadcast thành unicast gửi đến DHCP server","Đặt ip helper-address trên interface gateway của subnet cần DHCP (router hoặc SVI)","show ip dhcp binding: xem IP nào đã cấp cho MAC nào","show ip dhcp pool: xem pool, số IP đã dùng, còn lại","debug ip dhcp server events: troubleshoot khi client không lấy được IP"],
tip:"ip helper-address cũng forward các broadcast khác (TFTP, NBNS, etc.) — kiểm soát bằng cách chỉ định service cụ thể nếu cần",
cmds:"R(config)# ip dhcp excluded-address 192.168.10.1 192.168.10.10\nR(config)# ip dhcp pool VLAN10-CLINICAL\nR(dhcp-config)# network 192.168.10.0 255.255.255.0\nR(dhcp-config)# default-router 192.168.10.1\nR(dhcp-config)# dns-server 8.8.8.8 8.8.4.4\nR(dhcp-config)# lease 7\n\nHelper-address:\nR(config)# interface g0/0.20\nR(config-subif)# ip helper-address 192.168.10.5\n\nVerify:\nR# show ip dhcp binding\nR# show ip dhcp pool"}}
]},
{ph:1,w:9,topic:"Static Route & OSPF",sub:"ip route, OSPF single-area, troubleshoot",lessons:[
{type:"theory",title:"Static Route và Default Route",desc:"Cấu hình và troubleshoot static routing — nền tảng trước khi học dynamic routing.",
detail:{summary:"Static route là định tuyến thủ công — đơn giản, dự đoán được nhưng không tự động thích nghi khi topology thay đổi.",
points:["ip route [dst network] [mask] [next-hop IP hoặc exit interface]","Default route: ip route 0.0.0.0 0.0.0.0 [next-hop] — dùng khi không match route nào","Administrative Distance (AD): ưu tiên route. Static=1, OSPF=110, RIP=120 — AD nhỏ hơn = ưu tiên cao hơn","Floating static route: static route với AD cao hơn OSPF — dự phòng khi OSPF fail","show ip route: R=RIP, O=OSPF, S=Static, C=Connected, L=Local"],
tip:"Dấu * trong 'S*' là default route. 'Gateway of last resort' chỉ ra default route đang dùng — nếu thấy 'not set' là chưa có default route",
cmds:"R(config)# ip route 10.20.0.0 255.255.255.0 192.168.1.2\nR(config)# ip route 0.0.0.0 0.0.0.0 203.0.113.1\n\nFloating static (backup):\nR(config)# ip route 10.20.0.0 255.255.255.0 192.168.2.2 150\n\nVerify:\nR# show ip route\nR# show ip route 10.20.0.0"}},
{type:"theory",title:"OSPF: cấu hình, neighbor, troubleshoot",desc:"OSPF là giao thức định tuyến chính trong mạng doanh nghiệp — hiểu neighbor relationship là chìa khóa.",
detail:{summary:"OSPF tự động trao đổi route và hội tụ khi topology thay đổi. Neighbor relationship là nền tảng — nếu không lên neighbor thì không có route.",
points:["OSPF neighbor requirement: cùng area, cùng subnet, cùng MTU, cùng hello/dead timer, cùng authentication","router ospf 1: Process ID chỉ có ý nghĩa local — khác process ID vẫn có thể làm neighbor","network [subnet] [wildcard] area 0: wildcard = đảo ngược subnet mask","Router-ID: ưu tiên: manual > loopback cao nhất > physical interface cao nhất","show ip ospf neighbor: xem trạng thái FULL (tốt) hay stuck ở EXSTART/EXCHANGE (lỗi MTU/auth)"],
tip:"OSPF stuck ở EXSTART thường do MTU mismatch — kiểm tra 'ip ospf mtu-ignore' hoặc đồng nhất MTU trên cả 2 router",
cmds:"R(config)# router ospf 1\nR(config-router)# router-id 1.1.1.1\nR(config-router)# network 192.168.10.0 0.0.0.255 area 0\nR(config-router)# passive-interface g0/0\nR(config-router)# default-information originate\n\nVerify:\nR# show ip ospf neighbor\nR# show ip ospf interface\nR# show ip route ospf"}}
]},
{ph:1,w:10,topic:"EtherChannel & Port Security",sub:"LACP, PAgP, port-security, violation",lessons:[
{type:"theory",title:"EtherChannel: LACP và PAgP",desc:"Gộp nhiều link vật lý thành 1 logical để tăng băng thông và redundancy.",
detail:{summary:"EtherChannel giải quyết bottleneck giữa 2 switch bằng cách gộp 2-8 link vật lý. STP xem EtherChannel như 1 link duy nhất nên không block.",
points:["LACP (802.3ad, chuẩn IEEE): active/active hoặc active/passive. Nên dùng trong production","PAgP (Cisco proprietary): desirable/desirable hoặc desirable/auto","Channel-group: interface vật lý gán vào nhóm → tạo port-channel interface logic","Load balancing: theo src-mac, dst-mac, src-dst-mac, src-ip, dst-ip (cấu hình global)","EtherChannel fail: nếu một link down, traffic tự chuyển sang link còn lại — không bị ngắt kết nối"],
tip:"Các port trong EtherChannel PHẢI có cùng speed, duplex, VLAN mode, trunk allowed VLAN — không match sẽ bị suspend",
cmds:"switch(config)# interface range g0/1-2\nswitch(config-if-range)# channel-group 1 mode active\nswitch(config-if-range)# exit\nswitch(config)# interface port-channel 1\nswitch(config-if)# switchport mode trunk\nswitch(config-if)# switchport trunk allowed vlan 10,20,30\n\nVerify:\nswitch# show etherchannel summary\nswitch# show etherchannel port-channel"}},
{type:"theory",title:"Port Security: bảo vệ khỏi thiết bị trái phép",desc:"Giới hạn số MAC và loại MAC được phép trên một cổng switch.",
detail:{summary:"Port Security ngăn nhân viên cắm switch giả vào mạng hoặc thiết bị không được phép vào hạ tầng BV.",
points:["switchport port-security: bật tính năng (yêu cầu port phải là access mode)","maximum [n]: số MAC tối đa được phép (default: 1)","violation shutdown: port vào err-disabled nếu vi phạm (mạnh nhất, thường dùng)","violation restrict: drop frame vi phạm, tăng counter, gửi syslog","violation protect: chỉ drop frame vi phạm, không log (yếu nhất)","mac-address sticky: tự học và lưu MAC vào running-config — tiện lợi cho môi trường stable"],
tip:"Sau khi port err-disabled: shutdown rồi no shutdown để recover. Hoặc: errdisable recovery cause psecure-violation auto-recover",
cmds:"switch(config-if)# switchport mode access\nswitch(config-if)# switchport port-security\nswitch(config-if)# switchport port-security maximum 2\nswitch(config-if)# switchport port-security violation shutdown\nswitch(config-if)# switchport port-security mac-address sticky\n\nVerify:\nswitch# show port-security\nswitch# show port-security interface f0/1\nswitch# show port-security address"}}
]},
{ph:2,w:11,topic:"ACL — Standard & Extended",sub:"Lọc traffic, wildcard, ip access-group",lessons:[
{type:"theory",title:"Standard ACL và Extended ACL",desc:"Hai loại ACL với mức độ chi tiết khác nhau khi lọc traffic.",
detail:{summary:"ACL là danh sách quy tắc xử lý packet theo thứ tự từ trên xuống. Mỗi ACL kết thúc bằng implicit deny all.",
points:["Standard ACL (1-99): chỉ lọc src IP — đặt gần destination để tránh block traffic không cần thiết","Extended ACL (100-199): lọc src IP, dst IP, protocol, port — đặt gần source","Wildcard mask: 0 = must match, 1 = don't care. /24 mask 255.255.255.0 → wildcard 0.0.0.255","host 10.1.1.1 = 10.1.1.1 0.0.0.0 | any = 0.0.0.0 255.255.255.255","Thứ tự xử lý: top-down, match đầu tiên thì dừng. Implicit deny all ở cuối"],
tip:"Hay quên: ACL không có sẵn — phải tạo rồi apply vào interface với 'ip access-group'. ACL chưa apply thì chưa có tác dụng",
cmds:"Standard ACL:\nR(config)# access-list 10 deny 192.168.30.0 0.0.0.255\nR(config)# access-list 10 permit any\nR(config)# int g0/1\nR(config-if)# ip access-group 10 out\n\nExtended Named ACL:\nR(config)# ip access-list extended BLOCK-GUEST\nR(config-ext-nacl)# deny tcp 192.168.30.0 0.0.0.255 192.168.10.0 0.0.0.255 eq 23\nR(config-ext-nacl)# permit ip any any\nR# show access-lists"}},
{type:"extra",title:"Mở rộng: ACL troubleshoot và best practices",desc:"Kỹ thuật debug ACL và các lỗi thường gặp.",
detail:{summary:"ACL sai là một trong những lỗi phổ biến nhất trong thực tế. Biết cách debug và tránh các bẫy thường gặp.",
points:["show access-lists: xem match count — nếu counter không tăng khi traffic đi qua → ACL chưa apply đúng hướng","ip access-list resequence: đánh lại số thứ tự để có chỗ chèn rule mới vào giữa","log keyword: thêm vào cuối permit/deny để ghi log — hữu ích debug nhưng tốn CPU","Inbound vs Outbound: inbound filter traffic vào interface, outbound filter traffic ra khỏi interface","Bẫy phổ biến: permit any quá rộng cuối list nhưng quên rằng implicit deny đã block trước đó"],
tip:"Khi debug: show ip access-lists → xem match count. Nếu không có match → traffic không đến interface đó, hoặc ACL apply sai hướng",
cmds:"R# show ip access-lists\nR# show running-config | include access\nR# show interfaces g0/1 | include access list\n\nResequence:\nR(config)# ip access-list resequence BLOCK-GUEST 10 10\n\nLog:\nR(config-ext-nacl)# deny tcp any any eq 23 log"}}
]},
{ph:2,w:12,topic:"NAT / PAT & WAN",sub:"NAT static, dynamic, PAT overload",lessons:[
{type:"theory",title:"NAT static, dynamic và PAT",desc:"Ba dạng NAT từ đơn giản đến phức tạp nhất.",
detail:{summary:"NAT cho phép nhiều thiết bị dùng IP private ra Internet qua 1 hoặc vài IP public. PAT (NAT overload) là dạng phổ biến nhất.",
points:["NAT Static: 1 IP private ↔ 1 IP public cố định. Dùng cho server nội bộ cần truy cập từ ngoài","NAT Dynamic: pool IP public, mapping ngẫu nhiên. Ít dùng vì cần nhiều IP public","PAT (overload): nhiều IP private → 1 IP public, phân biệt bằng port. Tiết kiệm IP public nhất","ip nat inside: đặt trên interface LAN (private side)","ip nat outside: đặt trên interface WAN (public side)","show ip nat translations: xem mapping hiện tại (Proto | Inside local | Inside global | Outside global)"],
tip:"debug ip nat: xem real-time translation — hữu ích troubleshoot nhưng chỉ dùng trên thiết bị ít traffic",
cmds:"PAT configuration:\nR(config)# access-list 1 permit 192.168.0.0 0.0.255.255\nR(config)# ip nat inside source list 1 interface g0/0 overload\nR(config)# interface g0/0\nR(config-if)# ip nat outside\nR(config)# interface g0/1\nR(config-if)# ip nat inside\n\nNAT Static:\nR(config)# ip nat inside source static 192.168.10.100 203.0.113.10\n\nVerify:\nR# show ip nat translations\nR# show ip nat statistics"}}
]},
{ph:2,w:13,topic:"Wireless — 802.11 & Ruckus",sub:"Wi-Fi standards, WPA2/3, Controller AP",lessons:[
{type:"theory",title:"802.11 standards và RF fundamentals",desc:"Nền tảng kỹ thuật để thiết kế và troubleshoot mạng Wi-Fi BV.",
detail:{summary:"Hiểu RF fundamentals giúp giải thích tại sao Wi-Fi BV kém chất lượng và đề xuất cải thiện đúng hướng.",
points:["802.11b/g: 2.4GHz, 3 channel không overlap (1,6,11), tầm xa nhưng chậm và nhiễu","802.11n (Wi-Fi 4): dual-band, MIMO, channel bonding 40MHz","802.11ac (Wi-Fi 5): 5GHz only, MU-MIMO, channel 80-160MHz — nhanh nhưng tầm ngắn hơn","802.11ax (Wi-Fi 6/6E): OFDMA, BSS Coloring, Target Wake Time — tối ưu cho môi trường đông client như BV","RSSI: chỉ số tín hiệu (dBm). -50dBm rất tốt, -70dBm ổn, dưới -80dBm kém","Co-channel interference: 2 AP cùng channel phủ nhau → giảm throughput nghiêm trọng"],
tip:"Môi trường BV đặc biệt: tường gạch dày, thiết bị y tế phát nhiễu 2.4GHz (màn hình tim, máy thở). Ưu tiên 5GHz cho thiết bị quan trọng",
cmds:""}},
{type:"extra",title:"Mở rộng: Thiết kế Wi-Fi cho BV",desc:"Nguyên tắc thiết kế WLAN trong môi trường y tế đặc biệt.",
detail:{summary:"Mạng Wi-Fi BV phức tạp hơn văn phòng thông thường: thiết bị di động quan trọng, roaming liên tục, thiết bị y tế nhạy cảm.",
points:["Density-based design: BV có nhiều thiết bị/m² → cần nhiều AP hơn, giảm transmit power tránh co-channel interference","Roaming 802.11r (Fast BSS Transition): thiết bị di động y tế (máy tính bảng của bác sĩ) cần roaming <50ms","SSID segmentation: không dùng 1 SSID cho tất cả. SSID CLINICAL (VLAN 10, WPA2-Enterprise), SSID GUEST (VLAN 100, isolated)","Band steering: đẩy client có khả năng 5GHz sang 5GHz band tự động","Ruckus ChannelFly: tự động chọn channel tốt nhất theo real-time measurement — không cần manual planning"],
tip:"Thiết bị IoT y tế (nhiệt kế thông minh, máy đo SpO2 wireless) thường chỉ hỗ trợ 2.4GHz — cần giữ 2.4GHz ổn định nhưng quản lý nhiễu",
cmds:""}}
]},
{ph:2,w:14,topic:"Security: AAA, 802.1X, DHCP Snooping",sub:"RADIUS, TACACS+, DAI, Rogue DHCP",lessons:[
{type:"theory",title:"DHCP Snooping và Dynamic ARP Inspection",desc:"Hai tính năng bảo mật switch bắt buộc trong môi trường BV.",
detail:{summary:"DHCP Snooping và DAI là Layer 2 security features ngăn các cuộc tấn công phổ biến trong LAN mà BV thường bỏ qua.",
points:["DHCP Snooping: switch xây dựng binding table (MAC, IP, Port, VLAN) từ DHCP exchange hợp lệ","Trust port: uplink/port nối DHCP server thật. Untrust: access port nối client — reject DHCP Offer từ đây","ip dhcp snooping vlan 10,20: enable per-VLAN","DAI (Dynamic ARP Inspection): validate ARP packet dựa trên DHCP Snooping binding table","ARP Spoofing: attacker gửi ARP reply giả, claim IP của gateway → MITM attack. DAI chặn điều này"],
tip:"Bật ip dhcp snooping information option (DHCP option 82) có thể break một số DHCP server — nếu client không lấy được IP sau khi bật snooping, thử: no ip dhcp snooping information option",
cmds:"switch(config)# ip dhcp snooping\nswitch(config)# ip dhcp snooping vlan 10,20,30\nswitch(config)# no ip dhcp snooping information option\nswitch(config)# interface g0/1\nswitch(config-if)# ip dhcp snooping trust\n\nDAI:\nswitch(config)# ip arp inspection vlan 10,20,30\nswitch(config-if)# ip arp inspection trust\n\nVerify:\nswitch# show ip dhcp snooping binding\nswitch# show ip arp inspection"}}
]},
{ph:2,w:15,topic:"QoS & IP Services",sub:"DSCP, LLQ, NTP, SNMP, Syslog",lessons:[
{type:"theory",title:"QoS: Phân loại và ưu tiên traffic",desc:"Đảm bảo chất lượng thoại và video trong khi chia sẻ băng thông với data traffic.",
detail:{summary:"Không có QoS, traffic HIS database và IP phone cạnh tranh cùng băng thông — gây delay, jitter làm cuộc gọi bị rè, ngắt.",
points:["DSCP EF (46/0x2E): Expedited Forwarding — IP phone, real-time voice. Delay <150ms","DSCP AF41 (34): Video conference, camera surveillance","DSCP AF21 (18): HIS/LIS critical data. AF11: bulk data thấp hơn","DSCP CS6/CS7 (48/56): routing protocol, network control","LLQ (Low Latency Queuing): kết hợp Priority Queue (voice) + CBWFQ (data) — best practice cho voice","Shaping: smooth traffic, buffer excess. Policing: drop excess, phản ứng nhanh hơn"],
tip:"Ruckus AP hỗ trợ WMM (Wi-Fi Multimedia) — map DSCP sang CoS để ưu tiên voice trên wireless. Bật WMM trên SSID có IP phone",
cmds:"R(config)# class-map match-all VOIP\nR(config-cmap)# match dscp ef\nR(config)# policy-map QOS-POLICY\nR(config-pmap)# class VOIP\nR(config-pmap-c)# priority 512\nR(config-pmap)# class class-default\nR(config-pmap-c)# fair-queue\nR(config)# interface g0/0\nR(config-if)# service-policy output QOS-POLICY\n\nVerify:\nR# show policy-map interface g0/0"}}
]},
{ph:3,w:16,topic:"IPv6 & Network Automation",sub:"IPv6 dual-stack, Python netmiko",lessons:[
{type:"theory",title:"IPv6 cơ bản và dual-stack",desc:"Nền tảng IPv6 cho mạng hiện đại — BV nên chuẩn bị lộ trình migration.",
detail:{summary:"IPv6 với không gian địa chỉ 128-bit giải quyết cạn kiệt IPv4. Dual-stack chạy song song IPv4 và IPv6 trong giai đoạn transition.",
points:["Format: 8 nhóm 4 hex, phân cách bằng ':'. Rút gọn: :: thay nhiều nhóm 0000 liên tiếp","Global Unicast: 2000::/3 (tương đương IP public). Link-local: FE80::/10 (tự sinh, không route)","SLAAC: thiết bị tự cấu hình IPv6 từ Router Advertisement (không cần DHCP)","EUI-64: tính IPv6 từ MAC address — chia MAC làm 2, chèn FFFE ở giữa, flip bit 7","OSPFv3: chạy OSPF cho IPv6 — cú pháp khác OSPFv2 nhưng nguyên lý tương tự"],
tip:"Link-local FE80:: tự sinh trên mọi interface có IPv6 — không cần cấu hình thủ công. Dùng làm next-hop trong static route IPv6",
cmds:"R(config)# ipv6 unicast-routing\nR(config)# interface g0/0\nR(config-if)# ipv6 address 2001:db8:1::1/64\nR(config-if)# ipv6 address fe80::1 link-local\nR(config-if)# no shutdown\n\nVerify:\nR# show ipv6 interface brief\nR# show ipv6 route"}},
{type:"extra",title:"Mở rộng: Python automation với netmiko",desc:"Script backup config tự động cho tất cả switch BV.",
detail:{summary:"Network automation giúp tiết kiệm hàng giờ công việc thủ công. Script đơn giản dưới đây backup config từ nhiều switch cùng lúc.",
points:["Netmiko: thư viện Python SSH vào thiết bị network (Cisco, Juniper, Arista, ...)","Cài đặt: pip install netmiko","Đọc danh sách switch từ file CSV — dễ maintain và scale","Lưu output vào file với timestamp — tạo lịch sử backup có thể so sánh","Lập lịch với cron (Linux) hoặc Task Scheduler (Windows) để chạy hàng đêm"],
tip:"Bắt đầu đơn giản: script chạy show running-config và lưu file. Sau đó nâng cấp: parse output, so sánh diff, alert khi thay đổi",
cmds:"from netmiko import ConnectHandler\nimport datetime\n\ndevices = [\n  {'device_type':'cisco_ios','host':'192.168.99.10',\n   'username':'admin','password':'Admin@BV'},\n  {'device_type':'cisco_ios','host':'192.168.99.11',\n   'username':'admin','password':'Admin@BV'},\n]\n\nfor device in devices:\n  conn = ConnectHandler(**device)\n  output = conn.send_command('show running-config')\n  ts = datetime.datetime.now().strftime('%Y%m%d_%H%M')\n  filename = f\"backup_{device['host']}_{ts}.txt\"\n  with open(filename, 'w') as f:\n    f.write(output)\n  conn.disconnect()\n  print(f\"Backed up {device['host']} -> {filename}\")"}}
]},
{ph:3,w:17,topic:"Mock Exam — Chẩn đoán điểm yếu",sub:"60 câu/ngày, phân tích sai, drill",lessons:[
{type:"theory",title:"Chiến lược làm mock exam hiệu quả",desc:"Phương pháp học từ sai lầm — không phải số câu đúng mà là chất lượng review.",

{type:"lab",title:"Lab troubleshoot: Tìm lỗi trong topology có sẵn",desc:"Luyện tư duy troubleshoot có hệ thống từ L1 đến L7.",
detail:{summary:"Troubleshoot là kỹ năng thi CCNA (simulation question) và quan trọng nhất trong thực tế. Phải có phương pháp rõ ràng.",
points:["Bước 1: Define problem (mô tả chính xác: ai không ping được ai, từ khi nào)","Bước 2: Gather facts (show commands, không đoán)","Bước 3: Consider possibilities (L1 → L7)","Bước 4: Create action plan (sửa 1 thứ, test ngay, đừng sửa nhiều thứ cùng lúc)","Bước 5: Implement & verify (test sau mỗi thay đổi)","Bước 6: Document (ghi lại nguyên nhân và cách fix)"],
tip:"Lab troubleshoot tốt nhất: nhờ bạn học hoặc dùng PT Activity với lỗi cài sẵn. Tự tạo lab lỗi cho nhau để luyện",
cmds:"Checklist troubleshoot cơ bản:\nshow interfaces status → port up/down?\nshow ip interface brief → IP đúng không?\nshow vlan brief → port đúng VLAN?\nshow spanning-tree → port có bị block?\nshow ip route → có route đến đích?\nshow access-lists → ACL block không?\nping / traceroute → xác nhận kết nối"}}
]},
{ph:3,w:18,topic:"Mock Exam — Drill điểm yếu",sub:"Subnetting không máy tính, debug",lessons:[
{type:"theory",title:"Drill Subnetting không dùng máy tính",desc:"Luyện tính subnet trong 30 giây — kỹ năng bắt buộc cho kỳ thi.",
detail:{summary:"Thi CCNA không cho dùng máy tính. Subnetting xuất hiện trong nhiều câu hỏi — phải tính nhanh và chính xác.",
points:["Học thuộc: /24=256, /25=128, /26=64, /27=32, /28=16, /29=8, /30=4","Trick: network address = làm tròn xuống theo block size. Block size = 256 - subnet mask octet","Ví dụ: 192.168.1.200/27. Block = 256-224=32. Networks: 0,32,64,...,192,224. → Network: .192, Broadcast: .223","Luyện: subnettingpractice.com, 200 bài cho đến khi đạt <30 giây/bài","Câu hỏi hay: 'IP nào thuộc cùng subnet với 10.1.1.100/28?' → Block=16, dải: 96-111 → .100 trong dải 96-111"],
tip:"Thi CCNA có 2-3 câu subnetting thuần + nhiều câu ghép (ACL, OSPF, NAT có chứa subnet). Tốn 2 phút/câu subnet là bình thường",
cmds:""}}
]},

const PHASES=[{name:"GĐ1 — Nền tảng",color:"#2563eb"},{name:"GĐ2 — VLAN & Routing",color:"#7c3aed"},{name:"GĐ3 — Security & Services",color:"#dc2626"},{name:"GĐ4 — Ôn thi & Chứng chỉ",color:"#16a34a"}];
const TLABEL={theory:"Lý thuyết",lab:"Lab",apply:"Áp dụng BV",extra:"Mở rộng"};
const TCLASS={theory:"t-theory",lab:"t-lab",apply:"t-apply",extra:"t-extra"};
let done=new Set(),openWeeks=new Set(),openLessons=new Set(),filt="all",collPhase=new Set();

function lid(w,i){return`w${w}l${i}`}
function save(){try{localStorage.setItem('ccna2-done',JSON.stringify([...done]))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('ccna2-done')||'[]');done=new Set(d)}catch(e){}}
load();

function stats(){
  let tot=0,dn=0,wkDone=0;
  WEEKS.forEach(wk=>{wk.lessons.forEach((_,i)=>{tot++;if(done.has(lid(wk.w,i)))dn++;});const allD=wk.lessons.every((_,i)=>done.has(lid(wk.w,i)));if(allD)wkDone++;});
  const pct=tot?Math.round(dn/tot*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pt').textContent=`${dn} / ${tot} bài hoàn thành`;
  document.getElementById('s-done').textContent=dn;
  document.getElementById('s-week').textContent=wkDone;
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('s-left').textContent=WEEKS.filter(wk=>!wk.lessons.every((_,i)=>done.has(lid(wk.w,i)))).length;
}

function renderFilters(){
  const opts=[{k:'all',l:'Tất cả'},{k:'theory',l:'Lý thuyết'},{k:'lab',l:'Lab'},{k:'apply',l:'Áp dụng BV'},{k:'extra',l:'Mở rộng'},{k:'todo',l:'Chưa học'}];
  document.getElementById('flt').innerHTML=opts.map(o=>`<button class="fbtn${filt===o.k?' on':''}" onclick="setFilt('${o.k}')">${o.l}</button>`).join('');
}

function renderPhases(){
  const el=document.getElementById('phases');
  el.innerHTML=PHASES.map((ph,pi)=>{
    const weeks=WEEKS.filter(wk=>wk.ph===pi);
    const visWeeks=weeks.filter(wk=>{
      if(filt==='all')return true;
      if(filt==='todo')return !wk.lessons.every((_,i)=>done.has(lid(wk.w,i)));
      return wk.lessons.some(ls=>ls.type===filt);
    });
    if(!visWeeks.length)return'';
    const tot=weeks.reduce((a,wk)=>a+wk.lessons.length,0);
    const dn=weeks.reduce((a,wk)=>a+wk.lessons.filter((_,i)=>done.has(lid(wk.w,i))).length,0);
    const pct=tot?Math.round(dn/tot*100):0;
    const isC=collPhase.has(pi);
    return`<div>
<div class="phase-hdr" onclick="togglePhase(${pi})">
<span class="phase-title" style="color:${ph.color}">${ph.name}</span>
<div class="pct-bar"><div class="pct-fill" style="width:${pct}%;background:${ph.color}"></div></div>
<span class="pbadge" style="background:${ph.color}18;color:${ph.color}">${pct}%</span>
<span style="font-size:11px;color:var(--color-text-tertiary);transition:transform .2s;display:inline-block;transform:rotate(${isC?-90:0}deg)">▾</span>
</div>
<div style="display:${isC?'none':'block'}">${visWeeks.map(wk=>renderWeek(wk,ph.color)).join('')}</div>
</div>`;
  }).join('');
}

function renderWeek(wk,color){
  const lessons=filt==='all'?wk.lessons:filt==='todo'?wk.lessons.filter((_,i)=>!done.has(lid(wk.w,i))):wk.lessons.filter(ls=>ls.type===filt);
  if(!lessons.length)return'';
  const dn=wk.lessons.filter((_,i)=>done.has(lid(wk.w,i))).length;
  const tot=wk.lessons.length;
  const allD=dn===tot;
  const isO=openWeeks.has(wk.w);
  const sc=allD?'#16a34a':dn>0?'#d97706':'#888780';
  const sb=allD?'#dcfce7':dn>0?'#fef3c7':'var(--color-background-secondary)';
  const st=allD?'✓ Xong':dn>0?`${dn}/${tot}`:'Chưa học';
  return`<div class="week-card">
<div class="week-hdr" onclick="toggleWeek(${wk.w})">
<div class="wnum" style="background:${color}18;color:${color}">T${wk.w}</div>
<div class="wmeta"><div class="wtopic">${wk.topic}</div><div class="wsub">${wk.sub}</div></div>
<span class="wstatus" style="color:${sc};background:${sb};border-color:${sc}40" onclick="event.stopPropagation();markWeek(${wk.w})">${st}</span>
<span class="wchev" style="transform:rotate(${isO?180:0}deg)">▾</span>
</div>
<div class="wbody${isO?' open':''}">
${lessons.map((ls,ii)=>{
  const origIdx=wk.lessons.indexOf(ls);
  const id=lid(wk.w,origIdx);
  const isDone=done.has(id);
  const isLO=openLessons.has(id);
  const d=ls.detail||{};
  return`<div class="lesson-item">
<div class="lcheck${isDone?' done':''}" onclick="toggleLesson('${id}')">${isDone?'✓':''}</div>
<div class="linfo">
<div class="ltitle">${ls.title}<span class="tag ${TCLASS[ls.type]}">${TLABEL[ls.type]}</span></div>
<div class="ldesc">${ls.desc}</div>
${d.summary?`<span class="lexpand" onclick="toggleDetail('${id}')"><span style="display:inline-block;transition:transform .2s;transform:rotate(${isLO?90:0}deg)">▶</span> ${isLO?'Thu gọn':'Xem chi tiết & lệnh'}</span>
<div class="ldetail${isLO?' open':''}">
${d.summary?`<p style="margin-bottom:8px">${d.summary}</p>`:''}
${d.points&&d.points.length?`<h4>Nội dung chi tiết</h4><ul>${d.points.map(p=>`<li>${p}</li>`).join('')}</ul>`:''}
${d.tip?`<div class="tip">Tip thi: ${d.tip}</div>`:''}
${d.warn?`<div class="warn">Cảnh báo: ${d.warn}</div>`:''}
${d.cmds?`<h4 style="margin-top:8px">Lệnh thực hành</h4><code class="cmd">${d.cmds}</code>`:''}
${d.summary?`<button class="askbtn" onclick="sendPrompt('Giải thích thêm về: ${ls.title}')">Hỏi Claude về chủ đề này ↗</button>`:''}
</div>`:''}
</div>
</div>`;
}).join('')}
</div>
</div>`;
}

function render(){renderFilters();renderPhases();stats();}
window.setFilt=function(f){filt=f;render();}
window.togglePhase=function(pi){collPhase.has(pi)?collPhase.delete(pi):collPhase.add(pi);render();}
window.toggleWeek=function(w){openWeeks.has(w)?openWeeks.delete(w):openWeeks.add(w);render();}
window.toggleLesson=function(id){done.has(id)?done.delete(id):done.add(id);save();render();}
window.toggleDetail=function(id){openLessons.has(id)?openLessons.delete(id):openLessons.add(id);render();}
window.markWeek=function(w){
  const wk=WEEKS.find(x=>x.w===w);if(!wk)return;
  const allD=wk.lessons.every((_,i)=>done.has(lid(w,i)));
  wk.lessons.forEach((_,i)=>{const id=lid(w,i);allD?done.delete(id):done.add(id);});
  save();render();
}
render();
</script>
